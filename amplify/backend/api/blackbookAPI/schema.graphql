type Contact
    @model
    @auth(rules: [{ allow: owner }]) {
    id: ID!
    cnContactIdentifier: String
    firstName: String!
    lastName: String!
    company: String
    jobTitle: String
    emails: [String!]!
    phones: [String!]!
    addresses: [String!]!
    birthday: AWSDate
    photoS3Key: String
    interests: [String!]!
    familyDetails: String
    linkedInURL: String
    twitterHandle: String
    customFields: AWSJSON
    relationshipScore: Float!
    lastInteractionDate: AWSDateTime
    isPriority: Boolean!
    isHidden: Boolean!
    isMergedAway: Boolean!
    scoreTrendRaw: String
    metViaId: ID
    mergedIntoContactId: ID
    interactions: [Interaction!]! @hasMany(indexName: "byContact", fields: ["id"])
    notes: [Note!]! @hasMany(indexName: "byContact", fields: ["id"])
    reminders: [Reminder!]! @hasMany(indexName: "byContact", fields: ["id"])
    tagIds: [ID!]!
    groupIds: [ID!]!
    locationIds: [ID!]!
    activityIds: [ID!]!
    createdAt: AWSDateTime!
    updatedAt: AWSDateTime!
}

type Interaction
    @model
    @auth(rules: [{ allow: owner }]) {
    id: ID!
    contactId: ID! @index(name: "byContact", sortKeyFields: ["date"])
    type: InteractionType!
    date: AWSDateTime!
    duration: Float
    summary: String
    sentiment: Sentiment
    createdAt: AWSDateTime!
}

type Note
    @model
    @auth(rules: [{ allow: owner }]) {
    id: ID!
    contactId: ID! @index(name: "byContact", sortKeyFields: ["createdAt"])
    content: String!
    category: NoteCategory
    createdAt: AWSDateTime!
    updatedAt: AWSDateTime!
}

type Tag
    @model
    @auth(rules: [{ allow: owner }]) {
    id: ID!
    name: String!
    colorHex: String!
    contactIds: [ID!]!
}

type Group
    @model
    @auth(rules: [{ allow: owner }]) {
    id: ID!
    name: String!
    colorHex: String!
    icon: String!
    contactIds: [ID!]!
    activityIds: [ID!]!
}

type Location
    @model
    @auth(rules: [{ allow: owner }]) {
    id: ID!
    name: String!
    colorHex: String!
    icon: String!
    contactIds: [ID!]!
}

type Activity
    @model
    @auth(rules: [{ allow: owner }]) {
    id: ID!
    name: String!
    colorHex: String!
    icon: String!
    date: AWSDateTime!
    endDate: AWSDateTime
    activityDescription: String!
    googleEventId: String
    contactIds: [ID!]!
    groupIds: [ID!]!
    createdAt: AWSDateTime!
}

type Reminder
    @model
    @auth(rules: [{ allow: owner }]) {
    id: ID!
    contactId: ID! @index(name: "byContact", sortKeyFields: ["dueDate"])
    title: String!
    dueDate: AWSDateTime!
    isCompleted: Boolean!
    recurrence: Recurrence
    isAutoGenerated: Boolean!
    createdAt: AWSDateTime!
}

type ContactRelationship
    @model
    @auth(rules: [{ allow: owner }]) {
    id: ID!
    fromContactId: ID!
    toContactId: ID!
    label: String
    strength: Float
}

type RejectedCalendarEvent
    @model
    @auth(rules: [{ allow: owner }]) {
    id: ID!
    googleEventId: String!
    title: String!
    eventDate: AWSDateTime!
    calendarName: String!
    rejectedAt: AWSDateTime!
}

enum InteractionType {
    CALL
    MEETING
    TEXT
    EMAIL
    SOCIAL
    OTHER
}

enum Sentiment {
    POSITIVE
    NEUTRAL
    NEGATIVE
}

enum NoteCategory {
    GENERAL
    PERSONAL
    PROFESSIONAL
    TOPIC_DISCUSSED
}

enum Recurrence {
    WEEKLY
    BIWEEKLY
    MONTHLY
    QUARTERLY
}

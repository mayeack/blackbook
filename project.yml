name: Blackbook
options:
  bundleIdPrefix: com.blackbookdevelopment
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
packages:
  Amplify:
    url: https://github.com/aws-amplify/amplify-swift
    from: "2.0.0"
schemes:
  Blackbook:
    build:
      targets:
        Blackbook: all
    run:
      config: Debug
    profile:
      config: Release
targets:
  Blackbook:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - Blackbook
    dependencies:
      - package: Amplify
        product: Amplify
      - package: Amplify
        product: AWSCognitoAuthPlugin
      - package: Amplify
        product: AWSAPIPlugin
      - package: Amplify
        product: AWSS3StoragePlugin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blackbookdevelopment.app
        CODE_SIGN_ENTITLEMENTS: Blackbook/Blackbook.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 37NR4Z7NT6
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSContactsUsageDescription: "Blackbook needs access to your contacts to help you track and enrich your relationships."
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Blackbook uses Face ID to protect your data."
        INFOPLIST_KEY_CFBundleDisplayName: Blackbook
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
  BlackbookTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS]
    sources:
      - BlackbookTests
    dependencies:
      - target: Blackbook
    scheme:
      testTargets:
        - BlackbookTests
